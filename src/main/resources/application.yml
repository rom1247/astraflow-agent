spring:
  application:
    name: astraflow-agent
  threads:
    virtual:
      enabled: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        # 主循环必须用 V3（支持 tool calling）；deepseek-reasoner(R1) 不支持工具，仅用于无工具纯推理
        model: deepseek-v4-flash
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/astra_flow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
